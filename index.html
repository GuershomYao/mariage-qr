<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan invités mariage</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
font-family:Arial;
}

/* CAMERA PLEIN ECRAN */

#reader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
}

/* VIDEO FULLSCREEN */

#reader video{
width:100% !important;
height:100% !important;
object-fit:cover;
}

/* POPUP */

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

#popup-content{

color:white;
padding:40px;
border-radius:12px;
text-align:center;

width:85%;
max-width:500px;

font-size:28px;

}

/* COULEURS RESULTATS */

.valid{
background:#1faa00;
}

.used{
background:#ff9800;
}

.invalid{
background:#e00000;
}

button{

margin-top:25px;

font-size:22px;

padding:15px 35px;

border:none;

border-radius:8px;

background:black;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div id="reader"></div>

<div id="popup">
<div id="popup-content">
<div id="popup-result"></div>
<button onclick="restartScan()">Scanner suivant</button>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
