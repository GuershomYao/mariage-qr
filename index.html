<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan invités mariage</title>

<script src="https://unpkg.com/html5-qrcode@latest/html5-qrcode.min.js"></script>

<style>

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* PAGE DE CONNEXION */
#login-page {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

#login-container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 400px;
    text-align: center;
}

#login-container h1 {
    margin: 0 0 30px 0;
    color: #333;
    font-size: 28px;
}

#login-container input {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: border-color 0.3s;
}

#login-container input:focus {
    outline: none;
    border-color: #667eea;
}

#login-container button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
}

#login-container button:hover {
    transform: scale(1.02);
}

#login-container button:active {
    transform: scale(0.98);
}

#error-message {
    color: #e00000;
    margin-top: 10px;
    font-size: 14px;
    display: none;
}

/* PAGE PRINCIPALE */
#main-page {
    display: none;
    width: 100%;
    height: 100%;
}

#reader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: none;
}

#reader__scan_region {
    border: 4px solid rgba(255,255,255,0.6);
    border-radius: 20px;
}

#reader video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
}

/* BOUTON LANCER LE SCAN */
#scan-controls {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
}

#start-scan-btn {
    padding: 20px 50px;
    font-size: 20px;
    font-weight: bold;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
}

#start-scan-btn:hover {
    transform: scale(1.05);
}

#start-scan-btn:active {
    transform: scale(0.95);
}

#start-scan-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
}

/* POPUP RESULTAT */
#popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 30;
    background: rgba(0,0,0,0.8);
}

#popup-content {
    color: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 85%;
    max-width: 500px;
    font-size: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

#popup-result {
    margin-bottom: 20px;
    line-height: 1.6;
}

/* COULEURS RESULTATS */
.valid {
    background: #1faa00;
}

.used {
    background: #ff9800;
}

.invalid {
    background: #e00000;
}

button {
    margin-top: 15px;
    font-size: 18px;
    padding: 15px 35px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background: rgba(255,255,255,0.3);
}

/* HEADER */
#header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 15px;
    text-align: center;
    z-index: 15;
    display: none;
}

#header h2 {
    margin: 0;
    font-size: 20px;
}

#logout-btn {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    padding: 8px 15px;
    font-size: 14px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

@media (max-width: 480px) {
    #login-container {
        padding: 30px 20px;
    }
    
    #login-container h1 {
        font-size: 24px;
    }
    
    #popup-content {
        font-size: 20px;
        padding: 30px 20px;
    }
    
    #start-scan-btn {
        padding: 18px 40px;
        font-size: 18px;
    }
}

</style>

</head>

<body>

<!-- PAGE DE CONNEXION -->
<div id="login-page">
    <div id="login-container">
        <h1>🔐 Connexion Admin</h1>
        <input type="password" id="admin-code" placeholder="Code administrateur" autocomplete="off">
        <button onclick="checkLogin()">Se connecter</button>
        <div id="error-message">Code incorrect. Veuillez réessayer.</div>
    </div>
</div>

<!-- PAGE PRINCIPALE -->
<div id="main-page">
    <div id="header">
        <h2>Scanner QR Code</h2>
        <button id="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
    
    <div id="reader"></div>
    
    <div id="scan-controls">
        <button id="start-scan-btn" onclick="startScan()">📷 Lancer le scan</button>
    </div>
    
    <div id="popup">
        <div id="popup-content">
            <div id="popup-result"></div>
            <button onclick="restartScan()">Scanner suivant</button>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
